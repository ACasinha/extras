<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Horas Extra CMRM</title>

  <link rel="manifest" href="manifest.json">

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/beercss@3.8.0/dist/cdn/beer.min.css"
  >

  <link rel="stylesheet" href="css/app.css">

  <script
    type="module"
    src="js/app.js"
    defer
  ></script>
</head>
<body class="dark">

  <main class="responsive padding">

    <header class="margin bottom">
      <h3>Horas Extra CMRM</h3>
      <p>Offline First PWA</p>
    </header>

    <article class="round large-padding">
      <h5>Salário Base</h5>

      <div class="field label border">
        <input id="baseSalary" type="number" value="1762.30">
        <label>Salário Base</label>
      </div>

      <div class="field label border">
        <input id="irsRate" type="number" step="0.0001" value="0.1162">
        <label>IRS</label>
      </div>

      <div class="field label border">
        <input id="workDays" type="number" value="18">
        <label>Dias Trabalho</label>
      </div>
    </article>

    <article class="round large-padding margin top">
      <h5>Horas Extra</h5>

      <div class="field label border">
        <input id="firstHour" type="number" value="2">
        <label>1ª Hora</label>
      </div>

      <div class="field label border">
        <input id="remainingHours" type="number" value="6">
        <label>Restantes</label>
      </div>

      <div class="field label border">
        <input id="holidayHours" type="number" value="8">
        <label>Feriados</label>
      </div>
    </article>

    <article class="round large-padding margin top primary-container sticky-result">
      <h5>Total Final</h5>

      <h3 id="finalTotal">€ 0.00</h3>

      <nav>
        <div>
          <small>Horas Extra Líquidas</small>
          <strong id="netExtraHours">€ 0.00</strong>
        </div>

        <div>
          <small>Salário Líquido</small>
          <strong id="netSalary">€ 0.00</strong>
        </div>
      </nav>
    </article>

  </main>

</body>
</html>
